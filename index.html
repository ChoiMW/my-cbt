<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>웹 기반 CBT 시험 시스템</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- React & ReactDOM -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <!-- Babel (for JSX) -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <!-- Phosphor Icons -->
    <script src="https://unpkg.com/@phosphor-icons/web"></script>



    <style>
        body {
            font-family: 'Inter', sans-serif;
            background-color: #f3f4f6;
        }

        /* Custom scrollbar for better look */
        ::-webkit-scrollbar {
            width: 8px;
            height: 8px;
        }

        ::-webkit-scrollbar-track {
            background: #f1f1f1;
        }

        ::-webkit-scrollbar-thumb {
            background: #c1c1c1;
            border-radius: 4px;
        }

        ::-webkit-scrollbar-thumb:hover {
            background: #a8a8a8;
        }
    </style>
</head>

<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        // --- Mock Data (Default if no JSON uploaded) ---
        const defaultMockData = {
            "title": "샘플 테스트 시험 (공개용)",
            "questions": [
                {
                    "id": 1,
                    "question": "가장 좋아하는 과일을 고르시오.",
                    "options": [
                        "사과",
                        "바나나",
                        "오렌지",
                        "수박"
                    ],
                    "answer": 0,
                    "explanation": "이 문제는 샘플 더미 데이터입니다.\n이곳에 해설이 표시됩니다."
                },
                {
                    "id": 2,
                    "question": "다음 중 웹 브라우저에서 동작하는 프로그래밍 언어는 무엇입니까? \n\n\tA - Java\n\nB - C++\n\nC - JavaScript\n\nD - Python",
                    "options": [
                        "A",
                        "B",
                        "C",
                        "D"
                    ],
                    "answer": 2,
                    "explanation": "JavaScript는 웹 브라우저에서 동작하는 대표적인 클라이언트 사이드 스크립트 언어입니다."
                }
            ]
        };

        const App = () => {
            // App States
            const [examData, setExamData] = useState(null);
            const [appState, setAppState] = useState('HOME'); // HOME, EXAM, RESULT, WRONG_NOTE
            const [examMode, setExamMode] = useState(''); // 'LEARN' (한문제씩), 'TEST' (모두풀기)

            // Exam Progress States
            const [currentQuestionIndex, setCurrentQuestionIndex] = useState(0);
            const [userAnswers, setUserAnswers] = useState({}); // { questionId: selectedOptionIndex }
            const [showExplanation, setShowExplanation] = useState(false); // For LEARN mode

            // Storage States
            const [wrongNotes, setWrongNotes] = useState([]);

            const [jsonInput, setJsonInput] = useState('');
            const [activeExam, setActiveExam] = useState(null); // 추가: 현재 진행 중인 시험(메인 시험 or 오답 노트 시험)



            useEffect(() => {
                const storedWrongNotes = localStorage.getItem('cbt_wrong_notes');
                if (storedWrongNotes) {
                    setWrongNotes(JSON.parse(storedWrongNotes));
                }

                const storedExam = localStorage.getItem('cbt_current_exam');
                if (storedExam) {
                    setExamData(JSON.parse(storedExam));
                } else {
                    setExamData(defaultMockData); // Load default if none
                }
            }, []);

            const handleJsonSubmit = () => {
                if (!jsonInput.trim()) {
                    alert("JSON 데이터를 입력해주세요.");
                    return;
                }
                try {
                    const json = JSON.parse(jsonInput);

                    // 1. 상세한 유효성 검사 (오류 여부 체크)
                    if (!json.title || typeof json.title !== 'string') {
                        throw new Error("시험 제목(title)이 없거나 올바르지 않습니다.");
                    }
                    if (!json.questions || !Array.isArray(json.questions) || json.questions.length === 0) {
                        throw new Error("문제 배열(questions)이 없거나 비어있습니다.");
                    }

                    // 문항 데이터 검증
                    for (let i = 0; i < json.questions.length; i++) {
                        const q = json.questions[i];
                        if (!q.id || !q.question || !Array.isArray(q.options) || q.answer === undefined || !q.explanation) {
                            throw new Error(`[${i + 1}번 문제] 데이터 형식이 올바르지 않습니다. (필수항목 누락: id, question, options, answer, explanation)`);
                        }
                    }

                    // 2. 덮어쓰기 확인 (기본 샘플 데이터가 아닐 경우 경고)
                    const isSample = examData && examData.title === "샘플 시험: 일반 상식";
                    if (!isSample && examData) {
                        if (!confirm(`현재 로드된 [${examData.title}] 데이터가 삭제되고 새로운 데이터로 덮어씌워집니다. 진행하시겠습니까?`)) {
                            return; // 사용자가 취소한 경우 중단
                        }
                    }

                    // 3. 적용 및 덮어쓰기 (State & LocalStorage)
                    setExamData(json);
                    localStorage.setItem('cbt_current_exam', JSON.stringify(json));
                    setJsonInput(''); // 입력창 초기화
                    alert(`성공적으로 적용되었습니다!\n새 시험: ${json.title} (총 ${json.questions.length}문제)`);

                } catch (error) {
                    // JSON 문법 오류 또는 구조 유효성 검사 실패 시
                    if (error instanceof SyntaxError) {
                        alert("JSON 파싱 오류: 괄호, 쉼표, 큰따옴표 등의 문법 형식을 확인해주세요.\n(Gemini가 출력한 JSON 코드 블록 부분만 정확히 복사해야 합니다.)");
                    } else {
                        alert(`데이터 오류: ${error.message}`);
                    }
                }
            };

            const startExam = (mode) => {
                let questionsToTest = [];
                let title = "";

                if (mode === 'WRONG_TEST') {
                    if (wrongNotes.length === 0) {
                        alert("오답 노트가 비어 있습니다.");
                        return;
                    }
                    questionsToTest = [...wrongNotes];
                    title = "오답 노트 재시험";
                } else {
                    if (!examData || examData.questions.length === 0) {
                        alert("업로드된 문제가 없습니다.");
                        return;
                    }
                    questionsToTest = examData.questions;
                    title = examData.title;
                }

                setActiveExam({ title, questions: questionsToTest });
                setExamMode(mode);
                setCurrentQuestionIndex(0);
                setUserAnswers({});
                setShowExplanation(false);
                setAppState('EXAM');
            };

            const resetApp = () => {
                setAppState('HOME');
                setUserAnswers({});
                setCurrentQuestionIndex(0);
            };

            const handleOptionSelect = (questionId, optionIndex) => {
                // In LEARN mode, don't allow changing answer after viewing explanation
                if (examMode === 'LEARN' && showExplanation) return;

                setUserAnswers(prev => ({ ...prev, [questionId]: optionIndex }));
            };

            const handleNextQuestion = () => {
                if (currentQuestionIndex < activeExam.questions.length - 1) {
                    setCurrentQuestionIndex(prev => prev + 1);
                    setShowExplanation(false); // Reset explanation for next question
                } else {
                    finishExam();
                }
            };

            const handlePrevQuestion = () => {
                if (currentQuestionIndex > 0) {
                    setCurrentQuestionIndex(prev => prev - 1);
                    setShowExplanation(false);
                }
            };

            const checkAnswerLearnMode = () => {
                const currentQ = activeExam.questions[currentQuestionIndex];
                const currentQId = currentQ.id;
                const userAnswer = userAnswers[currentQId];

                if (userAnswer === undefined) {
                    alert("답을 선택해주세요.");
                    return;
                }

                setShowExplanation(true);

                // 정답 확인 시 오답 노트 즉시 업데이트
                setWrongNotes(prev => {
                    let newList = [...prev];
                    const index = newList.findIndex(wn => wn.id === currentQ.id);

                    if (userAnswer !== currentQ.answer) {
                        if (index === -1) {
                            newList.push({ ...currentQ, savedAt: new Date().toISOString() });
                        }
                    } else {
                        if (index > -1) {
                            newList.splice(index, 1);
                        }
                    }

                    localStorage.setItem('cbt_wrong_notes', JSON.stringify(newList));
                    return newList;
                });
            };

            const finishExam = () => {
                if ((examMode === 'TEST' || examMode === 'WRONG_TEST') && Object.keys(userAnswers).length < activeExam.questions.length) {
                    if (!confirm("아직 풀지 않은 문제가 있습니다. 그래도 제출하시겠습니까?")) return;
                }

                // 오답 노트 시험 모드가 아닐 때만 오답 노트 업데이트 (요구사항 반영)
                if (examMode !== 'WRONG_TEST') {
                    const currentWrongList = [...wrongNotes];

                    activeExam.questions.forEach(q => {
                        const userAnswer = userAnswers[q.id];
                        const isCorrect = userAnswer === q.answer;

                        if (!isCorrect) {
                            // Check if already in wrong notes to avoid duplicates
                            const exists = currentWrongList.find(wn => wn.id === q.id);
                            if (!exists) {
                                currentWrongList.push({
                                    ...q,
                                    savedAt: new Date().toISOString()
                                });
                            }
                        } else {
                            // Optionally remove from wrong notes if they got it right this time
                            const index = currentWrongList.findIndex(wn => wn.id === q.id);
                            if (index > -1) {
                                currentWrongList.splice(index, 1);
                            }
                        }
                    });

                    setWrongNotes(currentWrongList);
                    localStorage.setItem('cbt_wrong_notes', JSON.stringify(currentWrongList));
                }

                setAppState('RESULT');
            };

            const removeWrongNote = (id) => {
                const updatedList = wrongNotes.filter(n => n.id !== id);
                setWrongNotes(updatedList);
                localStorage.setItem('cbt_wrong_notes', JSON.stringify(updatedList));
            };



            const renderExam = () => {
                if (!activeExam) return null;
                const q = activeExam.questions[currentQuestionIndex];
                const selectedOption = userAnswers[q.id];
                const isAnswered = selectedOption !== undefined;
                const isCorrect = selectedOption === q.answer;

                return (
                    <div className="max-w-3xl mx-auto p-4 sm:p-6 bg-white rounded-xl shadow-lg mt-4 sm:mt-10 min-h-[60vh] flex flex-col">
                        {/* Header */}
                        <div className="flex justify-between items-center mb-6 pb-4 border-b">
                            <div className="text-sm font-semibold text-gray-500">
                                {examMode === 'LEARN' ? '📚 학습 모드' : examMode === 'WRONG_TEST' ? '📝 오답 재시험' : '⏱️ 시험 모드'}
                            </div>
                            <div className="text-lg font-bold text-blue-600">
                                {currentQuestionIndex + 1} / {activeExam.questions.length}
                            </div>
                            <button onClick={resetApp} className="text-gray-400 hover:text-gray-600">
                                <i className="ph ph-x-circle text-2xl"></i>
                            </button>
                        </div>

                        {/* Question */}
                        <div className="flex-grow">
                            <div className="flex items-start mb-6">
                                <span className="text-xl sm:text-2xl font-bold text-blue-500 mr-3 mt-0.5">Q.</span>
                                <div className="flex-1 text-gray-800">
                                    <h2 className="text-lg sm:text-xl font-semibold leading-relaxed whitespace-pre-wrap">
                                        {q.question.split('\n')[0]}
                                    </h2>
                                    {q.question.indexOf('\n') !== -1 && q.question.substring(q.question.indexOf('\n')).trim() && (
                                        <div className="mt-4 p-5 bg-gray-50 border border-gray-300 rounded-lg text-gray-700 leading-relaxed whitespace-pre-wrap text-base font-medium shadow-sm">
                                            {q.question.substring(q.question.indexOf('\n')).trim()}
                                        </div>
                                    )}
                                </div>
                            </div>

                            <div className="space-y-3">
                                {q.options.map((opt, idx) => {
                                    let btnClass = "w-full text-left p-4 rounded-lg border-2 transition-all ";
                                    let icon = "";

                                    if (examMode === 'LEARN' && showExplanation) {
                                        // Highlight answers in LEARN mode after checking
                                        if (idx === q.answer) {
                                            btnClass += "border-green-500 bg-green-50 text-green-800 font-bold";
                                            icon = <i className="ph-fill ph-check-circle text-green-500 ml-auto text-xl"></i>;
                                        } else if (idx === selectedOption && idx !== q.answer) {
                                            btnClass += "border-red-500 bg-red-50 text-red-800";
                                            icon = <i className="ph-fill ph-x-circle text-red-500 ml-auto text-xl"></i>;
                                        } else {
                                            btnClass += "border-gray-200 opacity-50";
                                        }
                                    } else {
                                        // Normal selection state
                                        if (selectedOption === idx) {
                                            btnClass += "border-blue-500 bg-blue-50 shadow-sm";
                                        } else {
                                            btnClass += "border-gray-200 hover:border-blue-300 hover:bg-gray-50";
                                        }
                                    }

                                    return (
                                        <button
                                            key={idx}
                                            onClick={() => handleOptionSelect(q.id, idx)}
                                            className={`${btnClass} flex items-center`}
                                        >
                                            <span className="w-8 h-8 flex items-center justify-center bg-white border border-gray-300 rounded-full mr-3 shrink-0 text-sm font-semibold">
                                                {idx + 1}
                                            </span>
                                            <span className="text-gray-700 text-lg whitespace-pre-wrap">{opt}</span>
                                            {icon}
                                        </button>
                                    );
                                })}
                            </div>

                            {/* Explanation (LEARN mode only) */}
                            {examMode === 'LEARN' && showExplanation && (
                                <div className={`mt-6 p-5 rounded-lg ${isCorrect ? 'bg-green-100 border border-green-300' : 'bg-red-100 border border-red-300'}`}>
                                    <h3 className={`font-bold mb-2 flex items-center ${isCorrect ? 'text-green-800' : 'text-red-800'}`}>
                                        {isCorrect ? <><i className="ph ph-smiley mr-2 text-xl"></i>정답입니다!</> : <><i className="ph ph-smiley-sad mr-2 text-xl"></i>틀렸습니다.</>}
                                    </h3>
                                    <p className="text-gray-700 whitespace-pre-wrap"><strong>해설:</strong> {q.explanation}</p>
                                </div>
                            )}
                        </div>

                        {/* Navigation Footer */}
                        <div className="mt-8 pt-4 border-t flex justify-between items-center">
                            <button
                                onClick={handlePrevQuestion}
                                disabled={currentQuestionIndex === 0}
                                className="px-5 py-2.5 rounded-lg font-medium text-gray-600 bg-gray-100 hover:bg-gray-200 disabled:opacity-50 flex items-center"
                            >
                                <i className="ph ph-caret-left mr-1"></i> 이전
                            </button>

                            {/* Learn Mode: Check Answer Button */}
                            {examMode === 'LEARN' && !showExplanation && (
                                <button
                                    onClick={checkAnswerLearnMode}
                                    className="px-6 py-2.5 rounded-lg font-bold text-white bg-indigo-600 hover:bg-indigo-700 shadow-md"
                                >
                                    정답 확인
                                </button>
                            )}

                            {/* Next / Submit Button */}
                            {currentQuestionIndex < activeExam.questions.length - 1 ? (
                                <button
                                    onClick={handleNextQuestion}
                                    disabled={examMode === 'LEARN' && !showExplanation && isAnswered === false} // Learn mode requires answering to proceed maybe? Let's allow skipping but better to check
                                    className="px-5 py-2.5 rounded-lg font-medium text-white bg-blue-600 hover:bg-blue-700 flex items-center"
                                >
                                    다음 <i className="ph ph-caret-right ml-1"></i>
                                </button>
                            ) : (
                                <button
                                    onClick={finishExam}
                                    className="px-6 py-2.5 rounded-lg font-bold text-white bg-rose-600 hover:bg-rose-700 shadow-md flex items-center"
                                >
                                    <i className="ph ph-flag-checkered mr-2"></i> 채점 및 완료
                                </button>
                            )}
                        </div>
                    </div>
                );
            };

            const renderResult = () => {
                let correctCount = 0;
                activeExam.questions.forEach(q => {
                    if (userAnswers[q.id] === q.answer) correctCount++;
                });
                const score = Math.round((correctCount / activeExam.questions.length) * 100);

                return (
                    <div className="max-w-2xl mx-auto p-6 bg-white rounded-xl shadow-lg mt-10 text-center">
                        <i className="ph ph-medal text-7xl text-yellow-500 mb-4 inline-block"></i>
                        <h2 className="text-3xl font-bold text-gray-800 mb-2">시험 완료!</h2>
                        <p className="text-gray-500 mb-8">수고하셨습니다. 채점 결과를 확인하세요.</p>

                        <div className="bg-gray-50 p-6 rounded-xl inline-block w-full max-w-sm mb-8 border border-gray-200">
                            <div className="text-5xl font-extrabold text-blue-600 mb-2">{score}<span className="text-2xl text-gray-400">점</span></div>
                            <div className="text-lg font-medium text-gray-700">
                                {correctCount} / {activeExam.questions.length} 문제 정답
                            </div>
                        </div>

                        {examMode !== 'WRONG_TEST' && (
                            <p className="text-sm text-red-500 mb-8">* 틀린 문제는 자동으로 오답 노트에 저장되었습니다.</p>
                        )}
                        {examMode === 'WRONG_TEST' && (
                            <p className="text-sm text-blue-500 mb-8">* 오답 노트 재시험 결과는 오답 노트에 다시 반영되지 않습니다.</p>
                        )}

                        <div className="flex flex-col sm:flex-row justify-center gap-4">
                            <button onClick={resetApp} className="px-6 py-3 bg-gray-200 text-gray-800 font-bold rounded-lg hover:bg-gray-300">
                                홈으로 돌아가기
                            </button>
                            <button onClick={() => setAppState('WRONG_NOTE')} className="px-6 py-3 bg-gray-800 text-white font-bold rounded-lg hover:bg-gray-900 flex items-center justify-center">
                                <i className="ph ph-notebook mr-2"></i> 오답 노트 확인
                            </button>
                        </div>
                    </div>
                );
            };

            const renderWrongNote = () => (
                <div className="max-w-4xl mx-auto p-4 sm:p-6 bg-white rounded-xl shadow-lg mt-4 sm:mt-10 min-h-[80vh]">
                    <div className="flex justify-between items-center mb-6 pb-4 border-b">
                        <h2 className="text-2xl font-bold text-gray-800 flex items-center">
                            <i className="ph ph-notebook text-red-500 mr-2"></i> 내 오답 노트
                        </h2>
                        <div className="flex space-x-2">
                            {wrongNotes.length > 0 && (
                                <button onClick={() => startExam('WRONG_TEST')} className="bg-rose-600 hover:bg-rose-700 text-white px-4 py-2 rounded-lg font-medium text-sm flex items-center shadow-sm">
                                    <i className="ph ph-exam mr-1"></i> 오답 다시 풀기
                                </button>
                            )}
                            <button onClick={resetApp} className="text-gray-600 bg-gray-100 hover:bg-gray-200 px-4 py-2 rounded-lg font-medium text-sm">
                                홈으로
                            </button>
                        </div>
                    </div>

                    {wrongNotes.length === 0 ? (
                        <div className="text-center py-20 text-gray-500">
                            <i className="ph ph-smiley text-6xl text-gray-300 mb-4 block"></i>
                            <p className="text-lg">저장된 오답이 없습니다. 완벽하네요!</p>
                        </div>
                    ) : (
                        <div className="space-y-6">
                            <div className="text-sm text-gray-500 text-right">총 {wrongNotes.length}문제</div>
                            {wrongNotes.map((q, index) => (
                                <div key={q.id} className="p-5 border border-red-200 bg-red-50/30 rounded-xl relative">
                                    <button
                                        onClick={() => removeWrongNote(q.id)}
                                        className="absolute top-4 right-4 text-gray-400 hover:text-red-500 flex items-center text-sm"
                                        title="오답 노트에서 삭제"
                                    >
                                        <i className="ph ph-trash mr-1"></i> 삭제
                                    </button>

                                    <h3 className="text-lg font-bold text-gray-800 mb-4 pr-16 flex items-start">
                                        <span className="text-red-500 mr-2 shrink-0">[{index + 1}]</span>
                                        {q.question}
                                    </h3>

                                    <div className="grid grid-cols-1 md:grid-cols-2 gap-2 mb-4">
                                        {q.options.map((opt, optIdx) => (
                                            <div key={optIdx} className={`p-3 rounded-lg border ${optIdx === q.answer ? 'bg-green-100 border-green-400 font-bold text-green-900' : 'bg-white border-gray-200'}`}>
                                                <span className="mr-2 text-sm text-gray-500">{optIdx + 1}.</span> {opt}
                                                {optIdx === q.answer && <i className="ph ph-check-circle text-green-600 ml-2"></i>}
                                            </div>
                                        ))}
                                    </div>

                                    <div className="mt-4 p-4 bg-white border border-gray-200 rounded-lg">
                                        <strong className="text-blue-700 flex items-center mb-1"><i className="ph ph-info mr-1"></i> 해설:</strong>
                                        <p className="text-gray-700 text-sm leading-relaxed whitespace-pre-wrap">{q.explanation}</p>
                                    </div>
                                </div>
                            ))}
                        </div>
                    )}
                </div>
            );

            // 추가된 부분: 메인 홈 화면 렌더링 함수
            const renderHome = () => (
                <div className="max-w-5xl mx-auto mt-8 grid gap-8 lg:grid-cols-2 pb-10">
                    {/* 왼쪽 패널: 시험 상태 및 시작 버튼 */}
                    <div className="bg-white p-6 rounded-xl shadow-lg flex flex-col justify-between border-t-4 border-blue-500">
                        <div>
                            <h2 className="text-2xl font-bold text-gray-800 mb-4 flex items-center">
                                <i className="ph ph-exam mr-2 text-blue-500 text-3xl"></i>
                                현재 준비된 시험
                            </h2>

                            {examData ? (
                                <div className="mb-8 p-5 bg-blue-50 rounded-xl border border-blue-100 relative overflow-hidden">
                                    <div className="absolute top-0 right-0 w-16 h-16 bg-blue-100 rounded-bl-full -z-0"></div>
                                    <h3 className="font-extrabold text-xl text-blue-900 mb-2 relative z-10">{examData.title}</h3>
                                    <p className="text-blue-700 font-medium relative z-10">총 {examData.questions.length}문제 대기 중</p>
                                </div>
                            ) : (
                                <div className="mb-8 p-5 bg-gray-50 rounded-xl border border-gray-200 text-center text-gray-500">
                                    로드된 시험 데이터가 없습니다.
                                </div>
                            )}

                            <div className="space-y-4">
                                <button
                                    onClick={() => startExam('LEARN')}
                                    disabled={!examData || examData.questions.length === 0}
                                    className="w-full bg-indigo-50 hover:bg-indigo-100 border border-indigo-200 text-indigo-700 font-bold py-4 px-4 rounded-xl transition flex items-center justify-between disabled:opacity-50 disabled:cursor-not-allowed group"
                                >
                                    <span className="flex items-center"><i className="ph ph-book-open text-2xl mr-3 group-hover:scale-110 transition-transform"></i> 학습 모드 (한문제씩)</span>
                                    <i className="ph ph-arrow-right"></i>
                                </button>
                                <button
                                    onClick={() => startExam('TEST')}
                                    disabled={!examData || examData.questions.length === 0}
                                    className="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-4 px-4 rounded-xl shadow-md transition flex items-center justify-between disabled:opacity-50 disabled:cursor-not-allowed group"
                                >
                                    <span className="flex items-center"><i className="ph ph-timer text-2xl mr-3 group-hover:scale-110 transition-transform"></i> 실전 시험 모드 (모두풀기)</span>
                                    <i className="ph ph-arrow-right"></i>
                                </button>
                            </div>
                        </div>

                        <div className="mt-8 pt-6 border-t border-gray-100">
                            <button
                                onClick={() => setAppState('WRONG_NOTE')}
                                className="w-full bg-gray-800 hover:bg-gray-900 text-white font-bold py-3 px-4 rounded-xl shadow transition flex items-center justify-center group"
                            >
                                <i className="ph ph-notebook text-xl mr-2 text-red-400 group-hover:scale-110 transition-transform"></i> 내 오답 노트 관리
                                {wrongNotes.length > 0 && (
                                    <span className="ml-3 bg-red-500 text-white text-xs font-bold px-2 py-1 rounded-full shadow-inner">
                                        {wrongNotes.length}
                                    </span>
                                )}
                            </button>
                        </div>
                    </div>

                    {/* 오른쪽 패널: JSON 입력부 */}
                    <div className="bg-white p-6 rounded-xl shadow-lg border-t-4 border-green-500 flex flex-col">
                        <div className="mb-4">
                            <h2 className="text-xl font-bold text-gray-800 flex items-center">
                                <i className="ph ph-code mr-2 text-green-500 text-2xl"></i>
                                문제 등록
                            </h2>
                        </div>

                        <p className="text-sm text-gray-500 mb-4 bg-gray-50 p-3 rounded-lg">
                            <i className="ph ph-info mr-1"></i>
                            생성된 JSON 코드를 아래에 붙여넣기 하세요. 기존 시험은 덮어씌워집니다.
                        </p>

                        <div className="flex-grow relative">
                            <textarea
                                className="w-full h-full min-h-[300px] p-4 bg-gray-900 text-green-400 border border-gray-800 rounded-xl focus:ring-2 focus:ring-green-500 focus:outline-none font-mono text-sm resize-none scrollbar-hide shadow-inner leading-relaxed"
                                placeholder={`{\n  "title": "시험 제목",\n  "questions": [\n    {\n      "id": 1,\n      "question": "문제",\n      "options": ["보기1", "보기2", "보기3", "보기4"],\n      "answer": 0,\n      "explanation": "해설내용"\n    }\n  ]\n}`}
                                value={jsonInput}
                                onChange={(e) => setJsonInput(e.target.value)}
                                spellCheck="false"
                            ></textarea>
                        </div>

                        <button
                            onClick={handleJsonSubmit}
                            className="mt-4 w-full bg-green-500 hover:bg-green-600 text-white font-bold py-4 px-4 rounded-xl shadow-md transition flex items-center justify-center group"
                        >
                            <i className="ph ph-check-circle text-2xl mr-2 group-hover:scale-110 transition-transform"></i> JSON 데이터 적용하기
                        </button>
                    </div>
                </div>
            );

            return (
                <div className="min-h-screen pb-10">
                    <nav className="bg-gray-800 text-white p-4 shadow-md sticky top-0 z-10">
                        <div className="max-w-6xl mx-auto flex justify-between items-center">
                            <div className="font-bold text-xl flex items-center cursor-pointer" onClick={resetApp}>
                                <i className="ph ph-laptop mr-2 text-blue-400"></i> CBT SYSTEM
                            </div>
                        </div>
                    </nav>

                    <main className="px-4">
                        {appState === 'HOME' && renderHome()}
                        {appState === 'EXAM' && renderExam()}
                        {appState === 'RESULT' && renderResult()}
                        {appState === 'WRONG_NOTE' && renderWrongNote()}
                    </main>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>

</html>
