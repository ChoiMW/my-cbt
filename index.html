<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>웹 기반 CBT 시험 시스템</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- React & ReactDOM -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <!-- Babel (for JSX) -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <!-- Phosphor Icons -->
    <script src="https://unpkg.com/@phosphor-icons/web"></script>

    <style>
        body {
            font-family: 'Inter', sans-serif;
            background-color: #f3f4f6;
        }

        ::-webkit-scrollbar { width: 8px; height: 8px; }
        ::-webkit-scrollbar-track { background: #f1f1f1; }
        ::-webkit-scrollbar-thumb { background: #c1c1c1; border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: #a8a8a8; }
    </style>
</head>

<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        const App = () => {
            // App States
            const [appState, setAppState] = useState('HOME'); // HOME, EXAM, RESULT, WRONG_NOTE
            const [examMode, setExamMode] = useState('TEST'); // TEST, LEARN, WRONG_TEST
            
            // Multiple Exam States
            const [examList, setExamList] = useState([]); 
            const [selectedExamId, setSelectedExamId] = useState(null);
            
            // Per-Exam Progress & Data
            const [allProgress, setAllProgress] = useState({});
            const [allWrongNotes, setAllWrongNotes] = useState({});

            // Current Exam Running States
            const [activeExam, setActiveExam] = useState(null);
            const [currentQuestionIndex, setCurrentQuestionIndex] = useState(0);
            const [userAnswers, setUserAnswers] = useState({});
            const [showExplanation, setShowExplanation] = useState(false);
            
            // JSON Input
            const [jsonInput, setJsonInput] = useState("");

            // Load data from localStorage on mount
            useEffect(() => {
                const savedExamList = JSON.parse(localStorage.getItem('cbt_examList') || '[]');
                const savedProgress = JSON.parse(localStorage.getItem('cbt_allProgress') || '{}');
                const savedWrongNotes = JSON.parse(localStorage.getItem('cbt_allWrongNotes') || '{}');
                
                setExamList(savedExamList);
                setAllProgress(savedProgress);
                setAllWrongNotes(savedWrongNotes);
                
                if (savedExamList.length > 0) {
                    setSelectedExamId(savedExamList[0].id);
                }
            }, []);

            // Save state to localStorage whenever it changes
            useEffect(() => {
                localStorage.setItem('cbt_examList', JSON.stringify(examList));
            }, [examList]);

            useEffect(() => {
                localStorage.setItem('cbt_allProgress', JSON.stringify(allProgress));
            }, [allProgress]);

            useEffect(() => {
                localStorage.setItem('cbt_allWrongNotes', JSON.stringify(allWrongNotes));
            }, [allWrongNotes]);

            // Save running progress to allProgress state
            useEffect(() => {
                if (appState === 'EXAM' && activeExam && examMode !== 'WRONG_TEST') {
                    setAllProgress(prev => ({
                        ...prev,
                        [activeExam.id]: {
                            currentQuestionIndex,
                            userAnswers
                        }
                    }));
                }
            }, [currentQuestionIndex, userAnswers, appState, activeExam, examMode]);


            // JSON Upload Handler
            const handleJsonSubmit = () => {
                if (examList.length >= 5) {
                    alert("시험은 최대 5개까지만 등록할 수 있습니다. 기존 시험을 삭제 후 등록해주세요.");
                    return;
                }

                try {
                    const parsed = JSON.parse(jsonInput);
                    // Handle both direct array or wrapped in {title, questions}
                    let newExam = {};
                    newExam.id = 'exam_' + Date.now();
                    
                    if (Array.isArray(parsed)) {
                        newExam.title = "사용자 등록 시험 " + (examList.length + 1);
                        newExam.questions = parsed;
                    } else if (parsed.questions && Array.isArray(parsed.questions)) {
                        newExam.title = parsed.title || "사용자 등록 시험 " + (examList.length + 1);
                        newExam.questions = parsed.questions;
                    } else {
                        throw new Error("올바른 시험 데이터 형식이 아닙니다.");
                    }

                    if (newExam.questions.length === 0) {
                        alert("문제가 하나도 없습니다.");
                        return;
                    }

                    setExamList([...examList, newExam]);
                    setSelectedExamId(newExam.id);
                    setJsonInput("");
                    alert(`"${newExam.title}" 시험이 정상적으로 등록되었습니다.`);

                } catch (e) {
                    alert("JSON 파싱 오류: " + e.message);
                }
            };

            const deleteExam = (id) => {
                if (confirm("이 시험과 관련된 진행 내역 및 오답 노트가 모두 삭제됩니다. 계속하시겠습니까?")) {
                    setExamList(examList.filter(e => e.id !== id));
                    
                    const newProgress = {...allProgress};
                    delete newProgress[id];
                    setAllProgress(newProgress);
                    
                    const newWrongNotes = {...allWrongNotes};
                    delete newWrongNotes[id];
                    setAllWrongNotes(newWrongNotes);
                    
                    if (selectedExamId === id) {
                        setSelectedExamId(null);
                    }
                }
            };

            const exportExamData = (exam) => {
                const progress = allProgress[exam.id] || { userAnswers: {}, currentQuestionIndex: 0 };
                const wrongNotes = allWrongNotes[exam.id] || [];
                
                const exportData = {
                    examId: exam.id,
                    examTitle: exam.title,
                    exportDate: new Date().toISOString(),
                    progress: progress,
                    wrongNotes: wrongNotes
                };

                const dataStr = "data:text/json;charset=utf-8," + encodeURIComponent(JSON.stringify(exportData, null, 2));
                const downloadAnchorNode = document.createElement('a');
                downloadAnchorNode.setAttribute("href", dataStr);
                downloadAnchorNode.setAttribute("download", `${exam.title}_학습기록.json`);
                document.body.appendChild(downloadAnchorNode);
                downloadAnchorNode.click();
                downloadAnchorNode.remove();
            };

            // Start Exam
            const startExam = (mode) => {
                if (mode === 'WRONG_TEST') {
                    const currentWrongNotes = allWrongNotes[selectedExamId] || [];
                    if (currentWrongNotes.length === 0) return;
                    setActiveExam({
                        id: selectedExamId,
                        title: '오답 다시 풀기',
                        questions: currentWrongNotes
                    });
                    setExamMode(mode);
                    setCurrentQuestionIndex(0);
                    setUserAnswers({});
                    setShowExplanation(false);
                    setAppState('EXAM');
                    return;
                }

                const examToStart = examList.find(e => e.id === selectedExamId);
                if (!examToStart) return;

                setActiveExam(examToStart);
                setExamMode(mode);
                setShowExplanation(false);

                // Resume progress if exists
                const progress = allProgress[examToStart.id];
                if (progress && Object.keys(progress.userAnswers).length > 0) {
                    if (confirm("이전에 풀던 기록이 있습니다. 이어서 푸시겠습니까?")) {
                        setCurrentQuestionIndex(progress.currentQuestionIndex || 0);
                        setUserAnswers(progress.userAnswers || {});
                    } else {
                        setCurrentQuestionIndex(0);
                        setUserAnswers({});
                        setAllProgress(prev => ({ ...prev, [examToStart.id]: { currentQuestionIndex: 0, userAnswers: {} } }));
                    }
                } else {
                    setCurrentQuestionIndex(0);
                    setUserAnswers({});
                }

                setAppState('EXAM');
            };

            const handleOptionSelect = (questionId, optionIndex) => {
                if (examMode === 'LEARN' && showExplanation) return; // Cannot change answer after showing explanation
                
                setUserAnswers(prev => ({
                    ...prev,
                    [questionId]: optionIndex
                }));
            };

            const checkAnswerLearnMode = () => {
                if (!activeExam) return;
                setShowExplanation(true);
            };

            const handleNextQuestion = () => {
                if (currentQuestionIndex < activeExam.questions.length - 1) {
                    setCurrentQuestionIndex(currentQuestionIndex + 1);
                    setShowExplanation(false);
                }
            };

            const handlePrevQuestion = () => {
                if (currentQuestionIndex > 0) {
                    setCurrentQuestionIndex(currentQuestionIndex - 1);
                    setShowExplanation(false);
                }
            };

            const finishExam = () => {
                if (examMode !== 'WRONG_TEST' && activeExam) {
                    // Update wrong notes
                    const currentWrongNotes = allWrongNotes[activeExam.id] || [];
                    const newWrongNoteIds = new Set(currentWrongNotes.map(q => q.id));
                    const updatedWrongNotes = [...currentWrongNotes];

                    activeExam.questions.forEach(q => {
                        const isCorrect = userAnswers[q.id] === q.answer;
                        if (!isCorrect && !newWrongNoteIds.has(q.id)) {
                            updatedWrongNotes.push(q);
                            newWrongNoteIds.add(q.id);
                        }
                    });

                    setAllWrongNotes(prev => ({
                        ...prev,
                        [activeExam.id]: updatedWrongNotes
                    }));
                    
                    // Reset progress for this exam upon completion
                    setAllProgress(prev => {
                        const newP = {...prev};
                        delete newP[activeExam.id];
                        return newP;
                    });
                }
                setAppState('RESULT');
            };

            const removeWrongNote = (questionId) => {
                if (!selectedExamId) return;
                setAllWrongNotes(prev => {
                    const notes = prev[selectedExamId] || [];
                    return {
                        ...prev,
                        [selectedExamId]: notes.filter(q => q.id !== questionId)
                    };
                });
            };

            const resetApp = () => {
                setAppState('HOME');
                setActiveExam(null);
            };

            // ---- Renders ----

            const renderHome = () => (
                <div className="max-w-6xl mx-auto mt-8 grid gap-8 lg:grid-cols-2 pb-10">
                    <div className="bg-white p-6 rounded-xl shadow-lg border-t-4 border-blue-500 flex flex-col">
                        <h2 className="text-2xl font-bold text-gray-800 mb-4 flex items-center">
                            <i className="ph ph-exam mr-2 text-blue-500 text-3xl"></i>
                            등록된 시험 목록 ({examList.length}/5)
                        </h2>

                        {examList.length === 0 ? (
                            <div className="flex-grow flex items-center justify-center p-8 bg-gray-50 rounded-xl border border-gray-200 text-gray-500 text-center">
                                <p>우측 패널에서 JSON 파일을 업로드하여<br/>시험을 등록하세요.</p>
                            </div>
                        ) : (
                            <div className="space-y-3 flex-grow overflow-y-auto pr-2">
                                {examList.map((exam) => {
                                    const isSelected = selectedExamId === exam.id;
                                    const wrongNotesCount = (allWrongNotes[exam.id] || []).length;
                                    
                                    return (
                                        <div 
                                            key={exam.id} 
                                            onClick={() => setSelectedExamId(exam.id)}
                                            className={`p-4 rounded-xl border-2 cursor-pointer transition-all ${isSelected ? 'border-blue-500 bg-blue-50' : 'border-gray-200 hover:border-blue-300'}`}
                                        >
                                            <div className="flex justify-between items-start mb-2">
                                                <h3 className={`font-bold text-lg ${isSelected ? 'text-blue-900' : 'text-gray-800'}`}>{exam.title}</h3>
                                                <div className="flex space-x-2">
                                                    <button 
                                                        onClick={(e) => { e.stopPropagation(); exportExamData(exam); }}
                                                        className="text-gray-500 hover:text-green-600 px-2 py-1 bg-white border border-gray-200 rounded shadow-sm flex items-center text-xs"
                                                        title="이 시험의 기록 내보내기"
                                                    >
                                                        <i className="ph ph-download-simple mr-1"></i> 내보내기
                                                    </button>
                                                    <button 
                                                        onClick={(e) => { e.stopPropagation(); deleteExam(exam.id); }}
                                                        className="text-gray-400 hover:text-red-500"
                                                    >
                                                        <i className="ph ph-trash text-xl"></i>
                                                    </button>
                                                </div>
                                            </div>
                                            <div className="flex text-sm text-gray-600 gap-4">
                                                <span><i className="ph ph-question text-gray-400"></i> 총 {exam.questions.length}제</span>
                                                <span className="text-red-500 font-medium"><i className="ph ph-notebook text-red-400"></i> 오답 {wrongNotesCount}개</span>
                                            </div>
                                        </div>
                                    );
                                })}
                            </div>
                        )}

                        {/* Action Buttons for Selected Exam */}
                        {selectedExamId && (
                            <div className="mt-6 pt-6 border-t border-gray-100 space-y-3">
                                <p className="text-sm text-gray-500 font-medium mb-2">선택된 시험 플레이:</p>
                                <div className="grid grid-cols-2 gap-3">
                                    <button
                                        onClick={() => startExam('LEARN')}
                                        className="bg-indigo-50 hover:bg-indigo-100 border border-indigo-200 text-indigo-700 font-bold py-3 px-4 rounded-xl transition flex items-center justify-center group"
                                    >
                                        <i className="ph ph-book-open text-xl mr-2 group-hover:scale-110 transition-transform"></i> 학습 모드
                                    </button>
                                    <button
                                        onClick={() => startExam('TEST')}
                                        className="bg-blue-600 hover:bg-blue-700 text-white font-bold py-3 px-4 rounded-xl shadow-md transition flex items-center justify-center group"
                                    >
                                        <i className="ph ph-timer text-xl mr-2 group-hover:scale-110 transition-transform"></i> 실전 모드
                                    </button>
                                </div>
                                <button
                                    onClick={() => setAppState('WRONG_NOTE')}
                                    disabled={(allWrongNotes[selectedExamId] || []).length === 0}
                                    className="w-full bg-gray-800 hover:bg-gray-900 text-white font-bold py-3 px-4 rounded-xl shadow transition flex items-center justify-center group disabled:opacity-50 disabled:cursor-not-allowed"
                                >
                                    <i className="ph ph-notebook text-xl mr-2 text-red-400 group-hover:scale-110 transition-transform"></i> 선택한 시험 오답노트
                                </button>
                            </div>
                        )}
                    </div>

                    <div className="bg-white p-6 rounded-xl shadow-lg border-t-4 border-green-500 flex flex-col">
                        <div className="mb-4">
                            <h2 className="text-xl font-bold text-gray-800 flex items-center">
                                <i className="ph ph-upload-simple mr-2 text-green-500 text-2xl"></i>
                                새로운 시험 등록
                            </h2>
                        </div>

                        <div className="mb-4">
                            <label className="flex items-center justify-center w-full bg-green-50 hover:bg-green-100 text-green-800 font-bold py-3 px-4 rounded-xl cursor-pointer transition border border-green-300 shadow-sm group">
                                <i className="ph ph-folder-open text-2xl mr-2 group-hover:-translate-y-1 transition-transform"></i> PC에서 JSON 파일 첨부
                                <input 
                                    type="file" 
                                    accept=".json" 
                                    className="hidden" 
                                    onChange={(e) => {
                                        const file = e.target.files[0];
                                        if (!file) return;
                                        const reader = new FileReader();
                                        reader.onload = (event) => setJsonInput(event.target.result);
                                        reader.readAsText(file);
                                    }} 
                                />
                            </label>
                        </div>

                        <div className="flex-grow relative">
                            <textarea
                                className="w-full h-full min-h-[250px] p-4 bg-gray-900 text-green-400 border border-gray-800 rounded-xl focus:ring-2 focus:ring-green-500 focus:outline-none font-mono text-sm resize-none scrollbar-hide shadow-inner"
                                placeholder="여기에 JSON 텍스트를 직접 붙여넣거나 위의 첨부 버튼을 이용하세요."
                                value={jsonInput}
                                onChange={(e) => setJsonInput(e.target.value)}
                                spellCheck="false"
                            ></textarea>
                        </div>

                        <button
                            onClick={handleJsonSubmit}
                            className="mt-4 w-full bg-green-500 hover:bg-green-600 text-white font-bold py-3 px-4 rounded-xl shadow-md transition flex items-center justify-center"
                        >
                            시험 등록하기
                        </button>
                    </div>
                </div>
            );

            const renderExam = () => {
                if (!activeExam) return null;
                const q = activeExam.questions[currentQuestionIndex];
                const selectedOption = userAnswers[q.id];
                const isAnswered = selectedOption !== undefined;
                const isCorrect = isAnswered && selectedOption === q.answer;

                return (
                    <div className="max-w-3xl mx-auto p-4 sm:p-6 bg-white rounded-xl shadow-lg mt-4 sm:mt-10 mb-10 min-h-[80vh] flex flex-col">
                        <div className="flex justify-between items-center mb-6 pb-4 border-b">
                            <h2 className="text-xl font-bold text-gray-800 truncate pr-4">{activeExam.title}</h2>
                            <div className="flex items-center space-x-4 shrink-0">
                                <div className="text-sm font-semibold px-3 py-1 bg-blue-100 text-blue-800 rounded-full">
                                    {currentQuestionIndex + 1} / {activeExam.questions.length}
                                </div>
                                <button onClick={resetApp} className="text-gray-500 hover:text-red-500 transition" title="나가기">
                                    <i className="ph ph-x text-2xl"></i>
                                </button>
                            </div>
                        </div>

                        <div className="flex-grow">
                            {examMode === 'LEARN' && (
                                <div className="mb-4 inline-block bg-indigo-100 text-indigo-800 text-xs font-bold px-2 py-1 rounded">
                                    <i className="ph ph-book-open mr-1"></i> 학습 모드 (한 문제씩 확인)
                                </div>
                            )}

                            <h3 className="text-xl font-bold text-gray-800 mb-6 leading-relaxed flex items-start whitespace-pre-wrap">
                                <span className="text-blue-600 mr-2 shrink-0">Q.</span>
                                <span dangerouslySetInnerHTML={{ __html: q.question }} />
                            </h3>

                            <div className="space-y-3">
                                {q.options.map((opt, idx) => {
                                    let btnClass = "w-full text-left p-4 rounded-xl border-2 transition-all ";
                                    let icon = null;

                                    if (examMode === 'LEARN' && showExplanation) {
                                        if (idx === q.answer) {
                                            btnClass += "border-green-500 bg-green-50 text-green-800 font-bold";
                                            icon = <i className="ph-fill ph-check-circle text-green-500 ml-auto text-xl"></i>;
                                        } else if (idx === selectedOption && idx !== q.answer) {
                                            btnClass += "border-red-500 bg-red-50 text-red-800";
                                            icon = <i className="ph-fill ph-x-circle text-red-500 ml-auto text-xl"></i>;
                                        } else {
                                            btnClass += "border-gray-200 opacity-50";
                                        }
                                    } else {
                                        if (selectedOption === idx) {
                                            btnClass += "border-blue-500 bg-blue-50 shadow-sm";
                                        } else {
                                            btnClass += "border-gray-200 hover:border-blue-300 hover:bg-gray-50";
                                        }
                                    }

                                    return (
                                        <button
                                            key={idx}
                                            onClick={() => handleOptionSelect(q.id, idx)}
                                            className={`${btnClass} flex items-center`}
                                        >
                                            <span className="w-8 h-8 flex items-center justify-center bg-white border border-gray-300 rounded-full mr-3 shrink-0 text-sm font-semibold">
                                                {idx + 1}
                                            </span>
                                            <span className="text-gray-700 text-lg whitespace-pre-wrap">{opt}</span>
                                            {icon}
                                        </button>
                                    );
                                })}
                            </div>

                            {examMode === 'LEARN' && showExplanation && (
                                <div className={`mt-6 p-5 rounded-lg ${!isAnswered ? 'bg-blue-100 border border-blue-300' : isCorrect ? 'bg-green-100 border border-green-300' : 'bg-red-100 border border-red-300'}`}>
                                    {isAnswered && (
                                        <h3 className={`font-bold mb-2 flex items-center ${isCorrect ? 'text-green-800' : 'text-red-800'}`}>
                                            {isCorrect ? <><i className="ph ph-smiley mr-2 text-xl"></i>정답입니다!</> : <><i className="ph ph-smiley-sad mr-2 text-xl"></i>틀렸습니다.</>}
                                        </h3>
                                    )}
                                    {!isAnswered && (
                                        <h3 className="font-bold mb-2 flex items-center text-blue-800">
                                            <i className="ph ph-info mr-2 text-xl"></i> 정답 확인
                                        </h3>
                                    )}
                                    <p className="text-gray-700 whitespace-pre-wrap"><strong>해설:</strong> {q.explanation}</p>
                                </div>
                            )}
                        </div>

                        <div className="mt-8 pt-4 border-t flex justify-between items-center">
                            <button
                                onClick={handlePrevQuestion}
                                disabled={currentQuestionIndex === 0}
                                className="px-5 py-2.5 rounded-lg font-medium text-gray-600 bg-gray-100 hover:bg-gray-200 disabled:opacity-50 flex items-center"
                            >
                                <i className="ph ph-caret-left mr-1"></i> 이전
                            </button>

                            {/* [Feature 5] "정답 및 해설 보기" 버튼: 학습 모드일 때만, 해설이 안보일 때만 표시 */}
                            {examMode === 'LEARN' && !showExplanation && (
                                <button
                                    onClick={checkAnswerLearnMode}
                                    className="px-6 py-2.5 rounded-lg font-bold text-white bg-indigo-600 hover:bg-indigo-700 shadow-md flex items-center"
                                >
                                    <i className="ph ph-check-square mr-2"></i> 정답 및 해설 보기
                                </button>
                            )}

                            {currentQuestionIndex < activeExam.questions.length - 1 ? (
                                <button
                                    onClick={handleNextQuestion}
                                    className="px-5 py-2.5 rounded-lg font-medium text-white bg-blue-600 hover:bg-blue-700 flex items-center"
                                >
                                    다음 <i className="ph ph-caret-right ml-1"></i>
                                </button>
                            ) : (
                                <button
                                    onClick={finishExam}
                                    className="px-6 py-2.5 rounded-lg font-bold text-white bg-rose-600 hover:bg-rose-700 shadow-md flex items-center"
                                >
                                    <i className="ph ph-flag-checkered mr-2"></i> 채점 및 완료
                                </button>
                            )}
                        </div>
                    </div>
                );
            };

            const renderResult = () => {
                let correctCount = 0;
                let answeredCount = 0;
                activeExam.questions.forEach(q => {
                    if (userAnswers[q.id] !== undefined) answeredCount++;
                    if (userAnswers[q.id] === q.answer) correctCount++;
                });
                const score = Math.round((correctCount / activeExam.questions.length) * 100);

                return (
                    <div className="max-w-2xl mx-auto p-6 bg-white rounded-xl shadow-lg mt-10 text-center">
                        <i className="ph ph-medal text-7xl text-yellow-500 mb-4 inline-block"></i>
                        <h2 className="text-3xl font-bold text-gray-800 mb-2">시험 완료!</h2>
                        <p className="text-gray-500 mb-8">수고하셨습니다. 채점 결과를 확인하세요.</p>

                        <div className="bg-gray-50 p-6 rounded-xl inline-block w-full max-w-sm mb-8 border border-gray-200">
                            <div className="text-5xl font-extrabold text-blue-600 mb-2">{score}<span className="text-2xl text-gray-400">점</span></div>
                            <div className="text-lg font-medium text-gray-700">
                                {correctCount} / {activeExam.questions.length} 문제 정답
                            </div>
                            <div className="text-sm text-gray-500 mt-2">
                                (총 푼 문제: {answeredCount}개)
                            </div>
                        </div>

                        {examMode !== 'WRONG_TEST' && (
                            <p className="text-sm text-red-500 mb-8">* 틀린 문제는 해당 시험의 오답 노트에 자동으로 저장되었습니다.</p>
                        )}

                        <div className="flex flex-col sm:flex-row justify-center gap-4">
                            <button onClick={resetApp} className="px-6 py-3 bg-gray-200 text-gray-800 font-bold rounded-lg hover:bg-gray-300">
                                홈으로 돌아가기
                            </button>
                            <button onClick={() => setAppState('WRONG_NOTE')} className="px-6 py-3 bg-gray-800 text-white font-bold rounded-lg hover:bg-gray-900 flex items-center justify-center">
                                <i className="ph ph-notebook mr-2"></i> 오답 노트 확인
                            </button>
                        </div>
                    </div>
                );
            };

            const renderWrongNote = () => {
                const wrongNotes = allWrongNotes[selectedExamId] || [];

                return (
                    <div className="max-w-4xl mx-auto p-4 sm:p-6 bg-white rounded-xl shadow-lg mt-4 sm:mt-10 min-h-[80vh]">
                        <div className="flex justify-between items-center mb-6 pb-4 border-b">
                            <h2 className="text-2xl font-bold text-gray-800 flex items-center">
                                <i className="ph ph-notebook text-red-500 mr-2"></i> 내 오답 노트
                            </h2>
                            <div className="flex space-x-2">
                                {wrongNotes.length > 0 && (
                                    <button onClick={() => startExam('WRONG_TEST')} className="bg-rose-600 hover:bg-rose-700 text-white px-4 py-2 rounded-lg font-medium text-sm flex items-center shadow-sm">
                                        <i className="ph ph-exam mr-1"></i> 오답 다시 풀기
                                    </button>
                                )}
                                <button onClick={resetApp} className="text-gray-600 bg-gray-100 hover:bg-gray-200 px-4 py-2 rounded-lg font-medium text-sm">
                                    홈으로
                                </button>
                            </div>
                        </div>

                        {wrongNotes.length === 0 ? (
                            <div className="text-center py-20 text-gray-500">
                                <i className="ph ph-smiley text-6xl text-gray-300 mb-4 block"></i>
                                <p className="text-lg">저장된 오답이 없습니다. 완벽하네요!</p>
                            </div>
                        ) : (
                            <div className="space-y-6">
                                <div className="text-sm text-gray-500 text-right">총 {wrongNotes.length}문제</div>
                                {wrongNotes.map((q, index) => (
                                    <div key={q.id} className="p-5 border border-red-200 bg-red-50/30 rounded-xl relative">
                                        <button
                                            onClick={() => removeWrongNote(q.id)}
                                            className="absolute top-4 right-4 text-gray-400 hover:text-red-500 flex items-center text-sm"
                                            title="오답 노트에서 삭제"
                                        >
                                            <i className="ph ph-trash mr-1"></i> 삭제
                                        </button>

                                        <h3 className="text-lg font-bold text-gray-800 mb-4 pr-16 flex items-start whitespace-pre-wrap">
                                            <span className="text-red-500 mr-2 shrink-0">[{index + 1}]</span>
                                            <span dangerouslySetInnerHTML={{ __html: q.question }} />
                                        </h3>

                                        <div className="grid grid-cols-1 md:grid-cols-2 gap-2 mb-4">
                                            {q.options.map((opt, optIdx) => (
                                                <div key={optIdx} className={`p-3 rounded-lg border ${optIdx === q.answer ? 'bg-green-100 border-green-400 font-bold text-green-900' : 'bg-white border-gray-200'}`}>
                                                    <span className="mr-2 text-sm text-gray-500">{optIdx + 1}.</span> {opt}
                                                    {optIdx === q.answer && <i className="ph ph-check-circle text-green-600 ml-2"></i>}
                                                </div>
                                            ))}
                                        </div>

                                        <div className="mt-4 p-4 bg-white border border-gray-200 rounded-lg">
                                            <strong className="text-blue-700 flex items-center mb-1"><i className="ph ph-info mr-1"></i> 해설:</strong>
                                            <p className="text-gray-700 text-sm leading-relaxed whitespace-pre-wrap">{q.explanation}</p>
                                        </div>
                                    </div>
                                ))}
                            </div>
                        )}
                    </div>
                );
            };

            return (
                <div className="min-h-screen pb-10">
                    <nav className="bg-gray-800 text-white p-4 shadow-md sticky top-0 z-10">
                        <div className="max-w-6xl mx-auto flex justify-between items-center">
                            <div className="font-bold text-xl flex items-center cursor-pointer" onClick={resetApp}>
                                <i className="ph ph-laptop mr-2 text-blue-400"></i> CBT SYSTEM
                            </div>
                        </div>
                    </nav>

                    <main className="px-4">
                        {appState === 'HOME' && renderHome()}
                        {appState === 'EXAM' && renderExam()}
                        {appState === 'RESULT' && renderResult()}
                        {appState === 'WRONG_NOTE' && renderWrongNote()}
                    </main>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>

</html>
